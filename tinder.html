<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SnowFinder — Tinder du Ski ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<style>
:root{--wood-pale:#f7efe2;--wood-light:#eddcbf;--wood:#c49a6c;--wood-dark:#8b5e3c;--blue:#5b9fd4;--blue-light:#e8f3fb;--blue-mid:#3a7db8;--blue-dark:#1a5a8a;--green:#5aaa72;--green-light:#e6f5eb;--text:#2a1f14;--text-mid:#5c4a35;--text-light:#8a7060;--bg:#faf6f0;--white:#fff;--border:#e8d8c4;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* NAV */
.topnav{background:var(--white);border-bottom:2px solid var(--wood-light);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.topnav-logo{font-family:"DM Serif Display",serif;font-size:1.2rem;color:var(--blue-dark);text-decoration:none;display:flex;align-items:center;gap:8px}
.topnav-logo img{height:30px;width:auto}
.topnav-back{margin-left:auto;font-size:.82rem;color:var(--blue-mid);text-decoration:none;font-weight:600}

/* INTRO */
.intro{text-align:center;padding:32px 20px 16px}
.intro h1{font-family:"DM Serif Display",serif;font-size:1.8rem;color:var(--text);margin-bottom:8px}
.intro p{font-size:.88rem;color:var(--text-light);max-width:380px;margin:0 auto 16px;line-height:1.6}
.criteria-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px}
.criteria-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:white;font-family:"DM Sans",sans-serif;font-size:.8rem;cursor:pointer;color:var(--text-mid);transition:all .2s;font-weight:500}
.criteria-btn.active{background:var(--blue-mid);border-color:var(--blue-mid);color:white;font-weight:700}

/* STACK DE CARTES */
.stack-wrap{position:relative;width:340px;height:480px;margin:0 auto 24px;touch-action:none;user-select:none}
.tinder-card{position:absolute;inset:0;border-radius:20px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.2);cursor:grab;transition:box-shadow .2s;background:white}
.tinder-card:nth-child(2){transform:scale(.96) translateY(8px);z-index:1}
.tinder-card:nth-child(3){transform:scale(.92) translateY(16px);z-index:0}
.tinder-card:active{cursor:grabbing}
.tinder-card.top{z-index:10}
.card-img{height:260px;background:center/cover no-repeat;position:relative}
.card-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%)}
.card-img-massif{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.5);color:white;font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.card-img-score{position:absolute;top:12px;right:12px;background:var(--wood);color:white;font-size:.78rem;font-weight:700;padding:3px 10px;border-radius:20px}
.card-img-name{position:absolute;bottom:14px;left:16px;right:16px;font-family:"DM Serif Display",serif;font-size:1.5rem;color:white;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.card-body{padding:14px 16px}
.card-region{font-size:.75rem;color:var(--text-light);margin-bottom:10px;display:flex;align-items:center;gap:4px}
.card-stats-row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.card-stat{font-size:.8rem;color:var(--text-mid);display:flex;align-items:center;gap:4px}
.card-desc{font-size:.82rem;color:var(--text-mid);line-height:1.5;margin-bottom:10px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px}
.card-tag{padding:3px 8px;border-radius:8px;font-size:.7rem;font-weight:600;background:var(--blue-light);color:var(--blue-dark)}

/* OVERLAY LIKE/NOPE */
.stamp-like{position:absolute;top:30px;left:20px;transform:rotate(-20deg);border:4px solid #2ea84e;color:#2ea84e;font-size:1.8rem;font-weight:800;padding:4px 12px;border-radius:8px;opacity:0;z-index:20;pointer-events:none;font-family:"DM Serif Display",serif;text-transform:uppercase;background:rgba(255,255,255,.9)}
.stamp-nope{position:absolute;top:30px;right:20px;transform:rotate(20deg);border:4px solid #cc2200;color:#cc2200;font-size:1.8rem;font-weight:800;padding:4px 12px;border-radius:8px;opacity:0;z-index:20;pointer-events:none;font-family:"DM Serif Display",serif;text-transform:uppercase;background:rgba(255,255,255,.9)}

/* BOUTONS SWIPE */
.swipe-btns{display:flex;justify-content:center;gap:24px;margin-bottom:32px}
.swipe-btn{width:60px;height:60px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;font-size:1.6rem;cursor:pointer;transition:all .2s;background:white;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.swipe-btn.nope{border-color:#cc2200;color:#cc2200}
.swipe-btn.nope:hover{background:#cc2200;color:white;transform:scale(1.1)}
.swipe-btn.skip{border-color:var(--wood);color:var(--wood)}
.swipe-btn.skip:hover{background:var(--wood);color:white;transform:scale(1.1)}
.swipe-btn.like{border-color:#2ea84e;color:#2ea84e}
.swipe-btn.like:hover{background:#2ea84e;color:white;transform:scale(1.1)}

/* COMPTEUR */
.counter{text-align:center;font-size:.82rem;color:var(--text-light);margin-bottom:8px}
.counter strong{color:var(--text)}

/* RÉSULTATS */
.results{max-width:600px;margin:0 auto;padding:0 16px 60px}
.results-title{font-family:"DM Serif Display",serif;font-size:1.5rem;color:var(--text);text-align:center;margin-bottom:20px}
.result-card{background:white;border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:flex;gap:0}
.result-card-img{width:100px;flex-shrink:0;background:center/cover no-repeat}
.result-card-body{padding:12px 14px;flex:1}
.result-card-name{font-family:"DM Serif Display",serif;font-size:1.05rem;color:var(--text);margin-bottom:4px}
.result-card-meta{font-size:.75rem;color:var(--text-light);margin-bottom:8px}
.result-card-btns{display:flex;gap:8px;flex-wrap:wrap}
.result-btn{padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;font-family:"DM Sans",sans-serif;transition:all .2s}
.result-btn-primary{background:var(--blue-mid);color:white}
.result-btn-primary:hover{background:var(--blue-dark)}
.result-btn-sec{background:var(--wood-pale);color:var(--wood-dark);border:1.5px solid var(--wood-light)}

/* PROGRESS */
.progress-wrap{max-width:340px;margin:0 auto 16px;padding:0 20px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue-mid),var(--green));border-radius:2px;transition:width .3s ease}

/* FIN */
.end-screen{text-align:center;padding:40px 20px;display:none}
.end-screen.show{display:block}
.end-emoji{font-size:4rem;margin-bottom:16px}
.end-title{font-family:"DM Serif Display",serif;font-size:1.8rem;color:var(--text);margin-bottom:8px}
.end-sub{font-size:.88rem;color:var(--text-light);margin-bottom:24px}
.restart-btn{padding:12px 28px;background:var(--blue-mid);color:white;border:none;border-radius:30px;font-family:"DM Sans",sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s}
.restart-btn:hover{background:var(--blue-dark);transform:translateY(-2px)}

@media(max-width:380px){
  .stack-wrap{width:300px;height:440px}
  .card-img{height:220px}
  .card-img-name{font-size:1.2rem}
}
</style>
</head>

    <div id="resultsList"></div>

<script>
const MASSIF_COLORS = {
  "Alpes du Nord":"linear-gradient(135deg,#1a5a8a,#3a7db8)",
  "Alpes du Sud":"linear-gradient(135deg,#8b5e3c,#c49a6c)",
  "Pyrénées":"linear-gradient(135deg,#2a6a38,#4aaa5a)",
  "Vosges":"linear-gradient(135deg,#3a6830,#5a9848)",
  "Jura":"linear-gradient(135deg,#3a5878,#6888a8)",
  "Massif Central":"linear-gradient(135deg,#784820,#a87840)",
  "Corse":"linear-gradient(135deg,#1a7848,#3aa868)"
};
const MASSIF_IMGS = {
  "Alpes du Nord":"https://images.unsplash.com/photo-1551524559-8af4e6624178?w=600&q=80",
  "Alpes du Sud":"https://images.unsplash.com/photo-1519681393784-d120267933ba?w=600&q=80",
  "Pyrénées":"https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=600&q=80",
  "Vosges":"https://images.unsplash.com/photo-1418985991508-e47386d96a71?w=600&q=80",
  "Jura":"https://images.unsplash.com/photo-1491555103944-7c647fd857e6?w=600&q=80",
  "Massif Central":"https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=80",
  "Corse":"https://images.unsplash.com/photo-1534258936925-c58bed479fcb?w=600&q=80"
};
const NIV = {debutant:"🟢",intermediaire:"🔵",avance:"🔴",expert:"⚫"};
const AMB = {famille:"👨‍👩‍👧",festif:"🎉",luxe:"💎",nature:"🌿",village:"🏡",avance:"⚡"};

// Données inline (top 60 stations)
const RAW_DATA = ''' + js_stations + ''';

let allStations = [];
let deck = [];
let likes = [];
let currentIdx = 0;
let currentFilter = "all";
let isDragging = false;
let startX = 0, startY = 0, currentX = 0;
let topCard = null;

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".criteria-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  restart();
}

function buildDeck() {
  let pool = RAW_DATA.filter(s => s.score >= 3.8);
  if(currentFilter === "famille") pool = pool.filter(s => s.amb.includes("famille"));
  else if(currentFilter === "rider") pool = pool.filter(s => s.tags.includes("rider") || s.amb.includes("avance"));
  else if(currentFilter === "luxe") pool = pool.filter(s => s.amb.includes("luxe"));
  else if(currentFilter === "budget") pool = pool.filter(s => s.forfait <= 30);
  else if(currentFilter === "village") pool = pool.filter(s => s.amb.includes("village"));

  // Shuffle
  pool = pool.sort(() => Math.random() - .5).slice(0, 25);
  return pool;
}

function renderStack() {
  const wrap = document.getElementById("stackWrap");
  wrap.innerHTML = "";

  const visible = deck.slice(currentIdx, currentIdx + 3);
  if(visible.length === 0) {
    showEnd();
    return;
  }

  visible.reverse().forEach((s, i) => {
    const card = createCard(s, i === visible.length - 1);
    wrap.appendChild(card);
  });

  topCard = wrap.querySelector(".tinder-card.top");
  if(topCard) initDrag(topCard);

  document.getElementById("cardNum").textContent = currentIdx + 1;
  document.getElementById("cardTotal").textContent = deck.length;
  document.getElementById("progressFill").style.width = ((currentIdx / deck.length) * 100) + "%";
}

function createCard(s, isTop) {
  const div = document.createElement("div");
  div.className = "tinder-card" + (isTop ? " top" : "");
  div.dataset.id = s.id;

  const img = MASSIF_IMGS[s.massif] || "";
  const bg = img ? `url(${img}) center/cover no-repeat` : MASSIF_COLORS[s.massif];
  const niveaux = s.niv.map(n => `${NIV[n]||""}`).join(" ");
  const ambiances = s.amb.slice(0,2).map(a => `${AMB[a]||""}`).join(" ");

  div.innerHTML = `
    <div class="stamp-like" id="stampLike${s.id}">❤ OUI</div>
    <div class="stamp-nope" id="stampNope${s.id}">✕ NON</div>
    <div class="card-img" style="background:${bg}">
      <div class="card-img-overlay"></div>
      <div class="card-img-massif">${s.massif}</div>
      <div class="card-img-score">${s.score} ⭐</div>
      <div class="card-img-name">${s.name}</div>
    </div>
    <div class="card-body">
      <div class="card-region">📍 ${s.region}</div>
      <div class="card-stats-row">
        <span class="card-stat">⛰ ${s.alt_max}m</span>
        <span class="card-stat">🎿 ${s.km}km</span>
        <span class="card-stat">💶 ${s.forfait}€/j</span>
        <span class="card-stat">🚡 ${s.remontees}</span>
      </div>
      <div class="card-desc">${s.desc.slice(0, 100)}…</div>
      <div class="card-tags">
        ${s.niv.map(n=>`<span class="card-tag">${NIV[n]||n} ${n}</span>`).join("")}
        ${s.amb.slice(0,2).map(a=>`<span class="card-tag" style="background:var(--wood-pale);color:var(--wood-dark)">${AMB[a]||""} ${a}</span>`).join("")}
      </div>
    </div>
  `;
  return div;
}

function initDrag(card) {
  // Touch
  card.addEventListener("touchstart", e => {
    isDragging = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    card.style.transition = "none";
  }, {passive:true});

  card.addEventListener("touchmove", e => {
    if(!isDragging) return;
    currentX = e.touches[0].clientX - startX;
    const rot = currentX * 0.1;
    card.style.transform = `translateX(${currentX}px) rotate(${rot}deg)`;

    const likeStamp = card.querySelector(`[id^=stampLike]`);
    const nopeStamp = card.querySelector(`[id^=stampNope]`);
    if(likeStamp) likeStamp.style.opacity = Math.max(0, currentX / 80);
    if(nopeStamp) nopeStamp.style.opacity = Math.max(0, -currentX / 80);
  }, {passive:true});

  card.addEventListener("touchend", () => {
    if(!isDragging) return;
    isDragging = false;
    card.style.transition = "transform .3s ease";

    if(currentX > 80) swipe("right");
    else if(currentX < -80) swipe("left");
    else {
      card.style.transform = "";
      const likeStamp = card.querySelector(`[id^=stampLike]`);
      const nopeStamp = card.querySelector(`[id^=stampNope]`);
      if(likeStamp) likeStamp.style.opacity = 0;
      if(nopeStamp) nopeStamp.style.opacity = 0;
    }
    currentX = 0;
  });

  // Mouse
  card.addEventListener("mousedown", e => {
    isDragging = true;
    startX = e.clientX;
    card.style.transition = "none";
  });

  window.addEventListener("mousemove", e => {
    if(!isDragging) return;
    currentX = e.clientX - startX;
    const rot = currentX * 0.1;
    card.style.transform = `translateX(${currentX}px) rotate(${rot}deg)`;

    const likeStamp = card.querySelector(`[id^=stampLike]`);
    const nopeStamp = card.querySelector(`[id^=stampNope]`);
    if(likeStamp) likeStamp.style.opacity = Math.max(0, currentX / 80);
    if(nopeStamp) nopeStamp.style.opacity = Math.max(0, -currentX / 80);
  });

  window.addEventListener("mouseup", () => {
    if(!isDragging) return;
    isDragging = false;
    card.style.transition = "transform .3s ease";

    if(currentX > 80) swipe("right");
    else if(currentX < -80) swipe("left");
    else {
      card.style.transform = "";
    }
    currentX = 0;
  });
}

function swipe(dir) {
  if(!topCard) return;
  const s = deck[currentIdx];

  topCard.style.transition = "transform .4s ease, opacity .4s ease";

  if(dir === "right") {
    topCard.style.transform = "translateX(120%) rotate(20deg)";
    likes.push(s);
    // Haptic feedback
    if(navigator.vibrate) navigator.vibrate(50);
  } else if(dir === "left") {
    topCard.style.transform = "translateX(-120%) rotate(-20deg)";
    if(navigator.vibrate) navigator.vibrate(30);
  } else {
    topCard.style.transform = "translateY(-120%)";
  }

  topCard.style.opacity = "0";
  currentIdx++;

  setTimeout(renderStack, 350);
}

function showEnd() {
  document.getElementById("mainContent").style.display = "none";
  document.getElementById("endScreen").classList.add("show");
  document.getElementById("likeCount").textContent = likes.length;

  const list = document.getElementById("resultsList");
  if(likes.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text-light);font-size:.88rem">Tu n\'as aimé aucune station… Recommence avec d\'autres critères !</p>';
    return;
  }

  list.innerHTML = likes.map(s => {
    const img = MASSIF_IMGS[s.massif] || "";
    const bg = img ? `url(${img}) center/cover no-repeat` : MASSIF_COLORS[s.massif];
    return `
      <div class="result-card">
        <div class="result-card-img" style="background:${bg}"></div>
        <div class="result-card-body">
          <div class="result-card-name">${s.name}</div>
          <div class="result-card-meta">📍 ${s.region} · ⭐ ${s.score} · 💶 ${s.forfait}€/j</div>
          <div class="result-card-btns">
            <a class="result-btn result-btn-primary" href="recherche.html?station=${s.id}">Voir la fiche</a>
            <a class="result-btn result-btn-sec" href="comparateur.html?s1=${s.id}">Comparer</a>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function restart() {
  likes = [];
  currentIdx = 0;
  deck = buildDeck();
  document.getElementById("mainContent").style.display = "block";
  document.getElementById("endScreen").classList.remove("show");
  renderStack();
}

// Init
restart();
</script>
