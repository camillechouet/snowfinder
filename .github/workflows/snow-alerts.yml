name: Snow Alerts

on:
  schedule:
    - cron: '0 7 * * *'   # Chaque matin à 7h UTC (8h ou 9h heure française)
  workflow_dispatch:       # Déclenchement manuel depuis l'onglet Actions

jobs:
  check-snow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Vérification enneigement & alertes push
        env:
          ONESIGNAL_APP_ID:  ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: python _scripts/onesignal_snow_check.py
