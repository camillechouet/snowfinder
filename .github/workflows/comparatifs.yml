name: Générer les comparatifs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '_scripts/generate_comparatifs.py'
      - 'recherche.html'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Générer les pages
        run: python3 _scripts/generate_comparatifs.py

      - name: Commit si changement
        run: |
          git config user.name "SnowFinder Bot"
          git config user.email "bot@snowfinder.fr"
          git add comparatifs/ _scripts/_index_snippet.html
          if git diff --cached --quiet; then
            echo "✓ Pas de changement"
          else
            git commit -m "🤖 Régénération des comparatifs"
            git push
          fi
